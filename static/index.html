<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foresight - Stock Prediction Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <header role="banner">
        <h1>Foresight</h1>
        <p>Stock Prediction Dashboard - Real-time LLM-powered analysis</p>
        <div id="connection-status" aria-live="polite" aria-atomic="true">
            <span class="status-indicator" id="status-indicator"></span>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar: Provider Leaderboard & Controls -->
        <aside id="sidebar" class="sidebar" role="complementary" aria-label="Provider Statistics">
            <section class="glass-panel">
                <h2>Provider Leaderboard</h2>
                <div id="provider-stats" role="list">
                    <div class="loading-skeleton"></div>
                </div>
            </section>

            <section class="glass-panel cycle-controls">
                <h2>Cycle Control</h2>
                <div id="current-cycle-info">
                    <p class="cycle-status">No active cycle</p>
                </div>
                <button id="start-cycle-btn" class="btn-primary" aria-label="Start new prediction cycle">
                    Start New Cycle
                </button>
                <button id="stop-cycle-btn" class="btn-secondary" disabled aria-label="Stop current cycle">
                    Stop Cycle
                </button>
            </section>
        </aside>

        <!-- Main: Stock Grid -->
        <main role="main" aria-label="Stock Predictions">
            <div id="stock-grid" class="glass-panel">
                <!-- D3.js grid rendered here -->
            </div>
        </main>

        <!-- Detail Panel: Stock Details (hidden by default) -->
        <aside class="detail-panel" id="stock-detail" role="complementary" aria-label="Stock Details" aria-hidden="true">
            <div class="detail-content glass-panel">
                <button class="close-btn" id="close-detail" aria-label="Close detail panel">
                    <span aria-hidden="true">&times;</span>
                </button>
                <div id="detail-body">
                    <div class="loading-skeleton"></div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/detail.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
