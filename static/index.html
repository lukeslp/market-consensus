<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Foresight Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/foresight/static/css/terminal.css">
</head>
<body>
  <!-- Market Direction Banner -->
  <header class="market-banner" id="market-banner">
    <div class="market-banner-inner">
      <div class="market-indicator" id="market-crypto">
        <span class="market-label">CRYPTO</span>
        <span class="market-dir" id="crypto-direction">--</span>
        <span class="market-conf" id="crypto-confidence"></span>
      </div>
      <div class="brand">
        <h1 class="brand-name">FORESIGHT</h1>
        <span class="brand-sub">AI Consensus Terminal</span>
      </div>
      <div class="market-indicator" id="market-equities">
        <span class="market-label">EQUITIES</span>
        <span class="market-dir" id="equities-direction">--</span>
        <span class="market-conf" id="equities-confidence"></span>
      </div>
    </div>
  </header>

  <!-- Controls Bar -->
  <nav class="controls-bar">
    <div class="controls-left">
      <div class="tab-group" id="market-tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="crypto">Crypto</button>
        <button class="tab" data-filter="equity">Equities</button>
      </div>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
        <input type="text" id="search-input" placeholder="Search ticker..." autocomplete="off">
      </div>
    </div>
    <div class="controls-right">
      <div class="sort-group">
        <label class="sort-label">Sort</label>
        <select id="sort-select">
          <option value="ticker">Ticker</option>
          <option value="confidence-desc">Confidence ↓</option>
          <option value="confidence-asc">Confidence ↑</option>
          <option value="price-desc">Price ↓</option>
          <option value="price-asc">Price ↑</option>
          <option value="direction">Direction</option>
        </select>
      </div>
      <div class="cycle-controls">
        <button id="run-cycle-btn" class="btn-action" title="Run Cycle">▶</button>
        <button id="abort-cycle-btn" class="btn-action btn-danger" title="Abort" disabled>■</button>
      </div>
      <div class="conn-status" id="conn-status" title="Connection status">
        <span class="conn-dot"></span>
      </div>
    </div>
  </nav>

  <!-- Stats Strip -->
  <div class="stats-strip">
    <div class="stat">
      <span class="stat-val" id="stat-accuracy">--</span>
      <span class="stat-key">Accuracy</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-predictions">--</span>
      <span class="stat-key">Predictions</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-cycles">--</span>
      <span class="stat-key">Cycles</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-stocks">--</span>
      <span class="stat-key">Tracked</span>
    </div>
    <div class="stat cycle-phase">
      <span class="stat-val" id="stat-phase">IDLE</span>
      <span class="stat-key">Phase</span>
    </div>
  </div>

  <!-- Main Content -->
  <main class="terminal-main">
    <!-- Stock Table -->
    <section class="stock-table-wrap" id="stock-table-wrap">
      <table class="stock-table" id="stock-table">
        <thead>
          <tr>
            <th class="col-ticker">Ticker</th>
            <th class="col-price">Price</th>
            <th class="col-direction">Signal</th>
            <th class="col-confidence">Conf</th>
            <th class="col-provider">Source</th>
          </tr>
        </thead>
        <tbody id="stock-tbody">
          <tr class="empty-row"><td colspan="5">Loading predictions...</td></tr>
        </tbody>
      </table>
    </section>

    <!-- Side Panel (collapsible) -->
    <aside class="side-panel" id="side-panel">
      <button class="panel-toggle" id="panel-toggle" title="Toggle panel">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>

      <div class="panel-content">
        <section class="panel-section">
          <h3 class="panel-heading">Providers</h3>
          <div id="provider-list" class="provider-list"></div>
        </section>

        <section class="panel-section">
          <h3 class="panel-heading">Accuracy</h3>
          <div id="accuracy-list" class="accuracy-list"></div>
        </section>

        <section class="panel-section">
          <h3 class="panel-heading">Recent Cycles</h3>
          <div id="cycle-list" class="cycle-list"></div>
        </section>
      </div>
    </aside>
  </main>

  <!-- Stock Detail Overlay -->
  <div class="detail-overlay" id="detail-overlay" hidden>
    <div class="detail-backdrop" id="detail-backdrop"></div>
    <div class="detail-panel">
      <div class="detail-header">
        <div class="detail-title-group">
          <h2 class="detail-ticker" id="detail-ticker">--</h2>
          <span class="detail-name" id="detail-name"></span>
        </div>
        <button class="detail-close" id="detail-close">✕</button>
      </div>
      <div class="detail-body" id="detail-body">
        <div class="detail-loading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Live Feed -->
  <footer class="live-feed" id="live-feed">
    <span class="feed-tag">LIVE</span>
    <div class="feed-track" id="feed-track">Awaiting predictions...</div>
  </footer>

  <script src="/foresight/static/js/terminal.js"></script>
</body>
</html>
