[pytest]
# Pytest configuration for Foresight

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests (fast, isolated functions)
    integration: Integration tests (multiple components)
    api: API endpoint tests
    database: Database tests
    slow: Slow tests (skip with -m 'not slow')

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage (when pytest-cov installed)
# Run with: pytest --cov=app --cov-report=html
